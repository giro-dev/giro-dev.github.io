{{ define "main" }}
<main>
  <article class="post container">
    <header class="post-header">
      <h1>{{ .Title }}</h1>
      <p class="date">{{ .Date.Format "Jan 2, 2006" }}</p>
      {{ if .Params.description }}<p class="lead">{{ .Params.description }}</p>{{ end }}
    </header>
    <div class="post-content">
      {{ .Content }}
    </div>
    <footer class="post-footer">
      <p><a href="{{ "/blog" | relURL }}">← Back to blog</a></p>
    </footer>
  </article>
</main>
{{ end }}
